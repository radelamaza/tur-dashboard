<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="alternate icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear contraseña — Tur.com</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #09090b;
            color: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        .card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
        }
        .logo-wrap { text-align: center; margin-bottom: 32px; }
        .logo-wrap img { height: 44px; }
        h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 8px; text-align: center; }
        .subtitle { font-size: 0.875rem; color: #a1a1aa; text-align: center; margin-bottom: 28px; }
        .email-badge {
            background: #27272a;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 0.875rem;
            color: #3b82f6;
            font-weight: 500;
            display: inline-block;
        }
        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #a1a1aa;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        input {
            width: 100%;
            background: #09090b;
            border: 1px solid #27272a;
            border-radius: 8px;
            padding: 10px 14px;
            color: #fafafa;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
            margin-bottom: 16px;
        }
        input:focus { border-color: #3b82f6; }
        button {
            width: 100%;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 11px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 4px;
        }
        button:hover { background: #2563eb; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #ef4444;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.875rem;
            margin-bottom: 16px;
            display: none;
        }
        .success {
            text-align: center;
            display: none;
        }
        .success .icon { font-size: 2.5rem; margin-bottom: 12px; }
        .success p { color: #a1a1aa; font-size: 0.9rem; margin-bottom: 20px; }
        .success a {
            display: inline-block;
            background: #3b82f6;
            color: #fff;
            padding: 10px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
        }
        #invalidToken { display: none; text-align: center; color: #a1a1aa; font-size: 0.9rem; }
        #invalidToken .icon { font-size: 2rem; margin-bottom: 12px; color: #ef4444; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-wrap">
            <img src="/logo.svg" alt="Tur.com">
        </div>

        <div id="loading" style="text-align:center; color:#a1a1aa; padding: 20px 0;">Verificando enlace...</div>

        <div id="invalidToken">
            <div class="icon">&#x26A0;</div>
            <p>Este enlace es inválido o ya expiró. Contacta al administrador para obtener uno nuevo.</p>
        </div>

        <div id="formSection" style="display:none;">
            <h2>Crear contraseña</h2>
            <p class="subtitle">Para la cuenta <span id="userEmail" class="email-badge"></span></p>
            <div class="error" id="error"></div>
            <form id="setPasswordForm">
                <label>Nueva contraseña</label>
                <input type="password" id="password" placeholder="Mínimo 8 caracteres" required minlength="8">
                <label>Confirmar contraseña</label>
                <input type="password" id="confirm" placeholder="Repite la contraseña" required>
                <button type="submit" id="btn">Crear contraseña</button>
            </form>
        </div>

        <div class="success" id="success">
            <div class="icon">&#x2705;</div>
            <h2 style="margin-bottom:8px;">Contraseña creada</h2>
            <p>Ya puedes iniciar sesión con tu cuenta.</p>
            <a href="/login.html">Ir al login</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(location.search);
        const token = params.get('token');

        if (!token) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('invalidToken').style.display = 'block';
        } else {
            fetch(`/api/auth/validate-token?token=${token}`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('loading').style.display = 'none';
                    if (data.ok) {
                        document.getElementById('userEmail').textContent = data.email;
                        document.getElementById('formSection').style.display = 'block';
                    } else {
                        document.getElementById('invalidToken').style.display = 'block';
                    }
                })
                .catch(() => {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('invalidToken').style.display = 'block';
                });
        }

        document.getElementById('setPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            const errorEl = document.getElementById('error');
            errorEl.style.display = 'none';

            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;

            if (password !== confirm) {
                errorEl.textContent = 'Las contraseñas no coinciden';
                errorEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Guardando...';

            try {
                const res = await fetch('/api/auth/set-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('formSection').style.display = 'none';
                    document.getElementById('success').style.display = 'block';
                } else {
                    errorEl.textContent = data.error || 'Error al guardar';
                    errorEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Crear contraseña';
                }
            } catch {
                errorEl.textContent = 'Error de conexión';
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Crear contraseña';
            }
        });
    </script>
</body>
</html>
