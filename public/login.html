<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Tur.com</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #09090b;
            color: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        .card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
        }
        .logo-wrap {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-wrap img { height: 44px; }
        h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 24px;
            text-align: center;
            color: #fafafa;
        }
        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #a1a1aa;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        input {
            width: 100%;
            background: #09090b;
            border: 1px solid #27272a;
            border-radius: 8px;
            padding: 10px 14px;
            color: #fafafa;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
            margin-bottom: 16px;
        }
        input:focus { border-color: #3b82f6; }
        button {
            width: 100%;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 11px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 4px;
        }
        button:hover { background: #2563eb; }
        button:disabled { background: #1d4ed8; opacity: 0.6; cursor: not-allowed; }
        .error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #ef4444;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.875rem;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-wrap">
            <img src="/logo.svg" alt="Tur.com">
        </div>
        <h2>Iniciar sesión</h2>
        <div class="error" id="error"></div>
        <form id="loginForm">
            <label>Email</label>
            <input type="email" id="email" placeholder="tu@tur.com" required autocomplete="email">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            <button type="submit" id="btn">Ingresar</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            const errorEl = document.getElementById('error');
            errorEl.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Ingresando...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value,
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = '/';
                } else {
                    errorEl.textContent = data.error || 'Error al iniciar sesión';
                    errorEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Ingresar';
                }
            } catch {
                errorEl.textContent = 'Error de conexión';
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Ingresar';
            }
        });
    </script>
</body>
</html>
